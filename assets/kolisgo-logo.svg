<svg width="640" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Icône fond sombre -->
  <rect x="40" y="40" width="120" height="120" rx="22" fill="#0e1a10"/>
  <!-- Lettre K -->
  <text x="100" y="118" font-family="Arial" font-weight="900" font-size="72" fill="#2ecc71" text-anchor="middle">K</text>
  <!-- Rails de train -->
  <rect x="52" y="148" width="96" height="5" rx="2.5" fill="#2ecc71"/>
  <rect x="52" y="158" width="96" height="5" rx="2.5" fill="#2ecc71" opacity="0.4"/>
  <!-- Traverses -->
  <rect x="62"  y="146" width="6" height="19" rx="2" fill="#1a8044"/>
  <rect x="80"  y="146" width="6" height="19" rx="2" fill="#1a8044"/>
  <rect x="98"  y="146" width="6" height="19" rx="2" fill="#1a8044"/>
  <rect x="116" y="146" width="6" height="19" rx="2" fill="#1a8044"/>
  <rect x="132" y="146" width="6" height="19" rx="2" fill="#1a8044"/>
  <!-- Wordmark -->
  <text x="185" y="105" font-family="Arial" font-weight="900" font-size="52" fill="#0e1a10" text-anchor="start">Kolis</text>
  <text x="380" y="105" font-family="Arial" font-weight="900" font-size="52" fill="#2ecc71" text-anchor="start">Go</text>
  <!-- Slogan -->
  <text x="185" y="138" font-family="Arial" font-weight="400" font-size="15" fill="#6b7e70" text-anchor="start">Quelqu'un prend le train. Votre kolis aussi.</text>
</svg>
